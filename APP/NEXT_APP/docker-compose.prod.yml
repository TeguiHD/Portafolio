# Docker Compose - Producción Optimizada para VM con Poca RAM
# Redis opcional: configurar REDIS_URL si se desea caching distribuido
# La app debe estar PRE-COMPILADA (npm run build en local)

services:
  app:
    image: node:23-alpine
    container_name: portfolio-app
    working_dir: /app
    command: node server.js
    ports:
      - "3000:3000"
    environment:
      - HOSTNAME=0.0.0.0
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@db:5432/portfolio_db
    env_file:
      - .env
    volumes:
      # El runtime standalone necesita server.js en /app y estáticos/public al lado.
      - ./.next/standalone:/app:ro
      - ./.next/static:/app/.next/static:ro
      - ./public:/app/public:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  db:
    image: postgres:18.1
    container_name: portfolio-db
    environment:
      POSTGRES_DB: portfolio_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  pgdata:
